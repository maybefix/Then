<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Then Workspace Switcher Mockup</title>
  <style>
    :root {
      --ui-font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Noto Sans JP", sans-serif;
      --editor-font-family:
        "Noto Serif JP", "Hiragino Mincho ProN", "Yu Mincho", YuMincho, serif;
      --bg-root: #181d20;
      --bg-primary: #1f2529;
      --bg-secondary: #252c31;
      --bg-tertiary: #2d353a;
      --bg-panel: #1f2529;
      --border-subtle: #394248;
      --border-strong: #566168;
      --text-primary: #fcfcfc;
      --text-secondary: #d9dee1;
      --text-muted: #a9b1b6;
      --text-faint: #7f898f;
      --accent: #e6e9ed;
      --accent-soft: rgba(230, 233, 237, 0.1);
      --control-hover: rgba(230, 233, 237, 0.08);
      --topbar-bg: #1f2529;
      --sidebar-bg: #252c31;
      --documentbar-height: 56px;
      --statusbar-height: 32px;
      --left-sidebar-width: 286px;
      color: var(--text-primary);
      background: var(--bg-root);
      font-family: var(--ui-font-family);
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    .appShell {
      width: 100vw;
      height: 100vh;
      min-width: 980px;
      min-height: 520px;
      background: var(--bg-root);
      font-family: var(--ui-font-family);
    }

    .appFrame {
      display: flex;
      width: 100%;
      height: 100%;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-root);
    }

    .topbar {
      display: flex;
      height: var(--documentbar-height);
      flex: 0 0 var(--documentbar-height);
      align-items: center;
      gap: 12px;
      padding: 0 16px 0 12px;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--topbar-bg);
      color: var(--text-muted);
      font-size: 14px;
    }

    .menuButton,
    .sidebarIconButton {
      display: inline-grid;
      width: 24px;
      height: 24px;
      place-items: center;
      border: 0;
      border-radius: 4px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .menuButton:hover,
    .menuButton[aria-expanded="true"],
    .sidebarIconButton:hover {
      background: var(--control-hover);
      color: var(--text-primary);
    }

    .breadcrumbs {
      position: relative;
      display: flex;
      min-width: 0;
      flex: 1;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .breadcrumbSegment {
      position: relative;
      display: inline-flex;
      min-width: 0;
      align-items: center;
      gap: 7px;
    }

    .crumbSeparator {
      color: var(--text-faint);
    }

    .breadcrumbFolderButton {
      display: inline-flex;
      max-width: 310px;
      height: 30px;
      align-items: center;
      gap: 7px;
      padding: 0 8px;
      border: 0;
      border-radius: 4px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
    }

    .breadcrumbFolderButton:hover,
    .breadcrumbFolderButton[aria-expanded="true"] {
      background: var(--control-hover);
      color: var(--text-primary);
    }

    .breadcrumbFolderButton span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .workspace {
      display: flex;
      min-height: 0;
      flex: 1;
      background: var(--bg-root);
    }

    .workspaceSidebar {
      display: flex;
      width: var(--left-sidebar-width);
      min-width: var(--left-sidebar-width);
      height: 100%;
      flex-direction: column;
      overflow: hidden;
      border-right: 0.5px solid var(--border-subtle);
      background: var(--sidebar-bg);
      color: var(--text-secondary);
    }

    .sidebarHeader {
      display: flex;
      min-height: 42px;
      flex: 0 0 42px;
      align-items: center;
      gap: 8px;
      padding: 0 10px 0 12px;
    }

    .sidebarHeaderLabel {
      min-width: 0;
      flex: 1;
      overflow: hidden;
      color: var(--text-faint);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .sidebarHeaderActions {
      display: inline-flex;
      align-items: center;
      gap: 2px;
    }

    .sidebarButtonSvg,
    .treeSvgIcon,
    .workspaceSwitcherIcon {
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .sidebarButtonSvg {
      width: 16px;
      height: 16px;
      stroke-width: 1.7;
    }

    .treeSvgIcon,
    .workspaceSwitcherIcon {
      width: 16px;
      height: 16px;
      stroke-width: 1.8;
    }

    .mockTree {
      display: grid;
      gap: 2px;
      padding: 6px;
    }

    .treeItem {
      display: flex;
      min-height: 30px;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      border-radius: 4px;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .activeTreeItem {
      background: var(--accent-soft);
      color: var(--text-primary);
    }

    .editorColumn {
      display: flex;
      min-width: 0;
      flex: 1;
      flex-direction: column;
      background: var(--bg-root);
    }

    .editorMock {
      min-width: 0;
      flex: 1;
      padding: 54px 68px;
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-family: var(--editor-font-family);
      font-size: 18px;
      line-height: 2.1;
      writing-mode: vertical-rl;
    }

    .statusbar {
      display: flex;
      min-height: var(--statusbar-height);
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-top: 1px solid var(--border-subtle);
      color: var(--text-faint);
      font-size: 12px;
    }

    .menuPopover {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 20;
      display: grid;
      width: 380px;
      max-width: calc(100vw - 28px);
      padding: 6px;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      background: var(--bg-panel);
      box-shadow: none;
    }

    .workspaceSwitcherHeader {
      display: grid;
      gap: 4px;
      padding: 8px 8px 10px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .workspaceSwitcherTitle {
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 720;
    }

    .workspaceSwitcherPath {
      overflow: hidden;
      color: var(--text-faint);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .workspaceSwitcherSearch {
      width: calc(100% - 8px);
      min-height: 32px;
      margin: 6px 4px;
      padding: 0 10px;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      outline: none;
    }

    .workspaceSwitcherSearch::placeholder {
      color: var(--text-faint);
    }

    .workspaceSwitcherSectionLabel {
      padding: 8px 8px 4px;
      color: var(--text-faint);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .workspaceRecordButton,
    .workspaceActionButton {
      display: grid;
      width: 100%;
      min-width: 0;
      min-height: 42px;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      border: 0;
      border-radius: 3px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      text-align: left;
    }

    .workspaceRecordButton:hover,
    .workspaceActionButton:hover,
    .workspaceRecordButton.activeMenuItem {
      background: var(--control-hover);
      color: var(--text-primary);
    }

    .workspaceRecordText {
      display: grid;
      min-width: 0;
      gap: 2px;
    }

    .workspaceRecordName {
      overflow: hidden;
      color: currentColor;
      font-size: 13px;
      font-weight: 650;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .workspaceRecordPath,
    .workspaceRecordMeta {
      overflow: hidden;
      color: var(--text-faint);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .workspaceRecordBadge {
      display: inline-flex;
      min-height: 20px;
      align-items: center;
      padding: 0 7px;
      border: 1px solid var(--border-subtle);
      border-radius: 999px;
      color: var(--text-faint);
      font-size: 11px;
    }

    .workspaceSwitcherDivider {
      height: 1px;
      margin: 6px 4px;
      background: var(--border-subtle);
    }

    .workspaceSwitcherSetting {
      display: flex;
      min-height: 32px;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .mockTopbarActions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <main class="appShell" data-theme="dark">
    <section class="appFrame" aria-label="Then">
      <header class="topbar">
        <button class="menuButton" type="button" aria-label="ファイルメニュー">☰</button>
        <nav class="breadcrumbs" aria-label="パンくず">
          <div class="breadcrumbSegment">
            <button class="breadcrumbFolderButton" type="button" aria-expanded="true">
              <svg class="workspaceSwitcherIcon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
              </svg>
              <span>長編ファンタジー</span>
            </button>
            <div class="menuPopover" role="menu" aria-label="プロジェクトを切り替え">
              <div class="workspaceSwitcherHeader">
                <span class="workspaceSwitcherTitle">長編ファンタジー</span>
                <span class="workspaceSwitcherPath">C:\Users\uest\Documents\novels\long-fantasy</span>
              </div>
              <input class="workspaceSwitcherSearch" value="" placeholder="プロジェクト名またはパスを検索" aria-label="プロジェクト検索" />
              <span class="workspaceSwitcherSectionLabel">最近開いたプロジェクト</span>
              <button class="workspaceRecordButton activeMenuItem" type="button" role="menuitem">
                <svg class="workspaceSwitcherIcon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                  <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
                </svg>
                <span class="workspaceRecordText">
                  <span class="workspaceRecordName">長編ファンタジー</span>
                  <span class="workspaceRecordPath">C:\Users\uest\Documents\novels\long-fantasy</span>
                </span>
                <span class="workspaceRecordBadge">現在</span>
              </button>
              <button class="workspaceRecordButton" type="button" role="menuitem">
                <svg class="workspaceSwitcherIcon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M3 6.5A2.5 2.5 0 0 1 5.5 4H10l2 2h6.5A2.5 2.5 0 0 1 21 8.5v8A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z" />
                </svg>
                <span class="workspaceRecordText">
                  <span class="workspaceRecordName">短編集 2026</span>
                  <span class="workspaceRecordPath">D:\Writing\short-stories-2026</span>
                </span>
                <span class="workspaceRecordMeta">昨日</span>
              </button>
              <button class="workspaceRecordButton" type="button" role="menuitem">
                <svg class="workspaceSwitcherIcon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M3 6.5A2.5 2.5 0 0 1 5.5 4H10l2 2h6.5A2.5 2.5 0 0 1 21 8.5v8A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z" />
                </svg>
                <span class="workspaceRecordText">
                  <span class="workspaceRecordName">設定資料集</span>
                  <span class="workspaceRecordPath">C:\Users\uest\Documents\worldbuilding</span>
                </span>
                <span class="workspaceRecordMeta">6日前</span>
              </button>
              <div class="workspaceSwitcherDivider"></div>
              <label class="workspaceSwitcherSetting">
                <input type="checkbox" checked />
                <span>プロジェクト切替にパスを表示</span>
              </label>
              <button class="workspaceActionButton" type="button" role="menuitem">
                <svg class="workspaceSwitcherIcon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M3 6.5A2.5 2.5 0 0 1 5.5 4H10l2 2h6.5A2.5 2.5 0 0 1 21 8.5v8A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z" />
                  <line x1="12" y1="10" x2="12" y2="16" />
                  <line x1="9" y1="13" x2="15" y2="13" />
                </svg>
                <span class="workspaceRecordText">
                  <span class="workspaceRecordName">別のフォルダを開く...</span>
                  <span class="workspaceRecordPath">フォルダ選択ダイアログからプロジェクトを追加</span>
                </span>
              </button>
            </div>
          </div>
          <span class="crumbSeparator">›</span>
          <div class="breadcrumbSegment">
            <button class="breadcrumbFolderButton" type="button">
              <span>第1部</span>
            </button>
          </div>
          <span class="crumbSeparator">›</span>
          <div class="breadcrumbSegment">
            <button class="breadcrumbFolderButton" type="button">
              <span>001-旅立ち.txt</span>
            </button>
          </div>
        </nav>
        <div class="mockTopbarActions">
          <button class="menuButton" type="button" aria-label="検索">⌕</button>
          <button class="menuButton" type="button" aria-label="設定">⚙</button>
        </div>
      </header>
      <div class="workspace">
        <aside class="workspaceSidebar" aria-label="アウトライン">
          <div class="sidebarHeader">
            <span class="sidebarHeaderLabel">Outline</span>
            <div class="sidebarHeaderActions">
              <button class="sidebarIconButton" type="button" aria-label="新規ファイル">
                <svg class="sidebarButtonSvg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <line x1="12" y1="5" x2="12" y2="19" />
                  <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
              </button>
              <button class="sidebarIconButton" type="button" aria-label="フォルダを開く">
                <svg class="sidebarButtonSvg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M3 6.5A2.5 2.5 0 0 1 5.5 4H10l2 2h6.5A2.5 2.5 0 0 1 21 8.5v8A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z" />
                </svg>
              </button>
            </div>
          </div>
          <div class="mockTree">
            <div class="treeItem">
              <svg class="treeSvgIcon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M3 6.5A2.5 2.5 0 0 1 5.5 4H10l2 2h6.5A2.5 2.5 0 0 1 21 8.5v8A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z" />
              </svg>
              <span>第1部</span>
            </div>
            <div class="treeItem activeTreeItem">
              <svg class="treeSvgIcon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
              </svg>
              <span>001-旅立ち.txt</span>
            </div>
            <div class="treeItem">
              <svg class="treeSvgIcon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
              </svg>
              <span>002-港町.txt</span>
            </div>
          </div>
        </aside>
        <section class="editorColumn">
          <div class="editorMock">
            <p>夜明け前の静寂の中、エリアスは汗ばんだ額を拭いながら起き上がった。</p>
            <p>また同じ夢だった。蒼穹の封印の扉、その向こうから響く無数の声。</p>
          </div>
          <footer class="statusbar">
            <span>保存済み</span>
            <span>長編ファンタジー / 001-旅立ち.txt / 1,248字</span>
          </footer>
        </section>
      </div>
    </section>
  </main>
</body>
</html>
