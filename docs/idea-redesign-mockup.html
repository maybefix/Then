<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Then / Idea 再設計モックアップ（スレッド二段ナビ）</title>
  <style>
    /* ---- Then 実テーマ（既定ダーク）に忠実なトークン ---- */
    :root {
      --bg-root: #181917;
      --bg-primary: #20221f;
      --bg-secondary: #1d1f1c;
      --bg-tertiary: #282b27;
      --bg-panel: #20221f;
      --bg-panel-strong: #252824;
      --border-subtle: #353934;
      --border-strong: #4a5048;
      --text-primary: #f5f6f3;
      --text-secondary: #c7cbc4;
      --text-muted: #8e958a;
      --text-faint: #6f756b;
      --accent: #5ca7d6;
      --accent-strong: #8cc9ee;
      --accent-soft: rgba(92, 167, 214, 0.16);
      --success: #65c478;
      --warning: #d7b65e;
      --danger: #d97373;
      --focus: rgba(92, 167, 214, 0.32);
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.4);
      color-scheme: dark;
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI",
        "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      font-size: 14px;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg-root); color: var(--text-primary); }
    button, input, textarea { font: inherit; color: inherit; }
    button { border: 0; background: none; cursor: pointer; }

    .app { display: grid; min-height: 100vh; grid-template-rows: 44px minmax(0, 1fr); }

    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      border-bottom: 1px solid var(--border-subtle); background: var(--bg-secondary); padding: 0 14px;
    }
    .brand { display: inline-flex; align-items: center; gap: 9px; font-size: 13px; font-weight: 650; }
    .brandMark {
      display: grid; width: 22px; height: 22px; place-items: center;
      border: 1px solid var(--border-strong); border-radius: 6px; color: var(--accent);
    }
    .topNote { color: var(--text-faint); font-size: 12px; }

    .workspace { display: grid; min-height: 0; grid-template-columns: minmax(0, 1fr) minmax(340px, 380px); }

    /* ---- 本文側（コンテキスト用、控えめ） ---- */
    .editorArea {
      display: grid; min-width: 0; grid-template-rows: 38px minmax(0, 1fr);
      border-right: 1px solid var(--border-subtle); background: var(--bg-secondary);
    }
    .editorBar {
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle); padding: 0 14px; color: var(--text-muted); font-size: 12px;
    }
    .statusDot { display: inline-flex; align-items: center; gap: 7px; }
    .statusDot::before { content: ""; width: 7px; height: 7px; border-radius: 999px; background: var(--success); }
    .manuscriptWrap { min-height: 0; overflow: auto; padding: 26px; }
    .manuscript {
      width: min(640px, 100%); min-height: calc(100vh - 130px); margin: 0 auto;
      border: 1px solid var(--border-subtle); border-radius: 8px; background: var(--bg-primary);
      padding: 34px 40px; line-height: 2; transition: box-shadow 140ms ease, border-color 140ms ease;
    }
    .manuscript.isDropTarget { border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus); }
    .manuscript h1 { margin: 0 0 22px; font-size: 20px; font-weight: 650; color: var(--text-primary); }
    .manuscriptText { min-height: 260px; outline: none; color: var(--text-secondary); white-space: pre-wrap; }

    /* ---- Idea ペイン（二段ナビ） ---- */
    .ideaPane { display: grid; min-width: 0; min-height: 0; grid-template-rows: minmax(0, 1fr); background: var(--bg-panel); }

    .stage { min-width: 0; min-height: 0; overflow: hidden; }
    .track { display: flex; width: 200%; height: 100%; transition: transform 240ms cubic-bezier(.4,0,.2,1); }
    .track.showDetail { transform: translateX(-50%); }
    .view { width: 50%; min-width: 0; min-height: 0; display: grid; grid-template-rows: auto minmax(0, 1fr); }

    .viewTop { border-bottom: 1px solid var(--border-subtle); }

    .paneHead {
      display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 14px 0;
    }
    .paneHead h2 { margin: 0; font-size: 14px; }
    .paneHead .count { color: var(--text-faint); font-size: 12px; font-weight: 400; }

    .newThreadBtn {
      display: inline-flex; align-items: center; gap: 6px; height: 28px; padding: 0 10px;
      border-radius: 6px; border: 1px solid var(--border-subtle); color: var(--text-secondary); font-size: 12px;
    }
    .newThreadBtn:hover { border-color: var(--border-strong); background: var(--bg-panel-strong); color: var(--text-primary); }

    /* キャプチャ欄 */
    .capture { padding: 10px 14px 0; }
    .captureBox {
      border: 1px solid var(--border-subtle); border-radius: 9px; background: var(--bg-panel-strong);
      padding: 8px 9px 9px; transition: border-color 120ms ease, box-shadow 120ms ease;
    }
    .captureBox:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus); }
    .captureBox textarea {
      width: 100%; min-height: 38px; max-height: 140px; resize: none; border: 0; outline: none;
      background: transparent; color: var(--text-primary); font-size: 13px; line-height: 1.6;
    }
    .captureBox textarea::placeholder { color: var(--text-faint); }
    .captureRow { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 6px; }
    .captureHint { color: var(--text-faint); font-size: 11px; }
    .destSelect {
      min-width: 0; max-width: 62%; height: 26px; border: 1px solid var(--border-subtle);
      border-radius: 6px; background: var(--bg-panel); color: var(--text-secondary); font-size: 12px; padding: 0 6px;
    }
    .destSelect:focus { outline: none; border-color: var(--accent); }
    .primaryBtn {
      display: inline-flex; align-items: center; gap: 6px; height: 28px; padding: 0 12px; border-radius: 6px;
      background: var(--accent); color: #0c1116; font-size: 12px; font-weight: 650;
    }
    .primaryBtn:hover { background: var(--accent-strong); }
    .primaryBtn:disabled { opacity: 0.4; cursor: default; }

    /* フィルタ */
    .filterBar { display: flex; gap: 6px; padding: 10px 14px 12px; overflow-x: auto; scrollbar-width: none; }
    .filterBar::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto; height: 26px; padding: 0 10px; border-radius: 999px;
      border: 1px solid var(--border-subtle); color: var(--text-muted); font-size: 12px;
    }
    .chip:hover { border-color: var(--border-strong); color: var(--text-secondary); }
    .chip.isActive { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-strong); }

    .scrollArea { min-height: 0; overflow-y: auto; padding: 8px 14px 18px; }

    /* スレッド一覧の行 */
    .threadRow {
      display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: center; gap: 8px;
      border: 1px solid var(--border-subtle); border-radius: 10px; background: var(--bg-secondary);
      padding: 11px 10px 11px 12px; margin-top: 10px; cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease;
    }
    .threadRow:hover { border-color: var(--border-strong); background: var(--bg-panel-strong); }
    .threadRow.isInbox { background: color-mix(in srgb, var(--accent) 6%, var(--bg-secondary)); }
    .rowMain { min-width: 0; }
    .rowTitle {
      display: flex; align-items: center; gap: 6px; overflow: hidden;
      font-size: 13px; font-weight: 650; color: var(--text-primary);
      text-overflow: ellipsis; white-space: nowrap;
    }
    .rowTitle .star { color: var(--warning); flex: 0 0 auto; display: inline-grid; place-items: center; }
    .rowTitle .star svg { width: 13px; height: 13px; }
    .rowSummary {
      display: -webkit-box; margin-top: 4px; overflow: hidden; color: var(--text-muted);
      font-size: 12px; line-height: 1.55; -webkit-box-orient: vertical; -webkit-line-clamp: 2;
    }
    .rowMeta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 7px; color: var(--text-faint); font-size: 11px; }
    .rowMeta .unused { color: var(--warning); }
    .rowChevron { display: grid; place-items: center; width: 22px; color: var(--text-faint); }
    .rowChevron svg { width: 16px; height: 16px; }

    /* 詳細ヘッダ */
    .detailTop { padding: 10px 14px 0; }
    .detailNav { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .backBtn {
      display: inline-flex; align-items: center; gap: 5px; height: 28px; padding: 0 8px 0 6px;
      border-radius: 6px; color: var(--text-secondary); font-size: 12px;
    }
    .backBtn:hover { background: var(--bg-panel-strong); color: var(--text-primary); }
    .detailActions { display: inline-flex; gap: 2px; }
    .detailTitle {
      width: 100%; margin-top: 8px; border: 1px solid transparent; border-radius: 6px; outline: none;
      background: transparent; color: var(--text-primary); font-size: 16px; font-weight: 700; line-height: 1.4; padding: 3px 5px;
    }
    .detailTitle:focus { border-color: var(--border-strong); background: var(--bg-panel-strong); box-shadow: 0 0 0 3px var(--focus); }
    .detailTitle:read-only { cursor: default; }
    .detailStats { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 10px 5px; color: var(--text-faint); font-size: 11px; }
    .detailStats .unused { color: var(--warning); }

    .iconBtn { display: grid; place-items: center; width: 28px; height: 28px; border-radius: 6px; color: var(--text-muted); }
    .iconBtn:hover { background: var(--bg-panel-strong); color: var(--text-primary); }
    .iconBtn.isOn { color: var(--warning); }
    .iconBtn svg, .newThreadBtn svg, .primaryBtn svg, .backBtn svg {
      width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }

    /* 断片 */
    .fragment {
      display: grid; grid-template-columns: 16px minmax(0, 1fr); gap: 8px;
      border: 1px solid var(--border-subtle); border-radius: 9px; background: var(--bg-secondary);
      padding: 9px 9px 9px 6px; margin-top: 8px;
    }
    .fragment:hover { border-color: var(--border-strong); background: var(--bg-panel-strong); }
    .fragment.isUsed { background: var(--bg-secondary); }
    .fragment.isUsed .fragBody { color: var(--text-faint); text-decoration: line-through; text-decoration-color: var(--border-strong); }
    .dragHandle { align-self: start; margin-top: 2px; color: var(--text-faint); cursor: grab; line-height: 0; }
    .dragHandle:active { cursor: grabbing; }
    .dragHandle svg { width: 14px; height: 14px; fill: currentColor; stroke: none; }
    .fragment.isDragging { opacity: 0.4; }
    .fragBody { color: var(--text-secondary); font-size: 13px; line-height: 1.65; white-space: pre-wrap; outline: none; }
    .fragBody:focus { background: var(--accent-soft); border-radius: 4px; }
    .fragFoot { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 7px; }
    .fragTime { color: var(--text-faint); font-size: 11px; }
    .fragBtns { display: inline-flex; align-items: center; gap: 4px; }
    .textBtn { height: 24px; padding: 0 8px; border-radius: 5px; border: 1px solid var(--border-subtle); color: var(--text-secondary); font-size: 11px; }
    .textBtn:hover { border-color: var(--accent); color: var(--accent-strong); }
    .miniIcon { display: grid; place-items: center; width: 24px; height: 24px; border-radius: 5px; color: var(--text-muted); }
    .miniIcon:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .miniIcon.isOn { color: var(--success); }
    .miniIcon svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }
    .moveSelect {
      height: 24px; max-width: 130px; border: 1px solid var(--border-subtle); border-radius: 5px;
      background: var(--bg-panel); color: var(--text-muted); font-size: 11px; padding: 0 4px;
    }
    .moveSelect:hover { color: var(--text-secondary); border-color: var(--border-strong); }
    .moveSelect:focus { outline: none; border-color: var(--accent); color: var(--text-secondary); }

    .emptyState {
      margin-top: 30px; border: 1px dashed var(--border-subtle); border-radius: 10px;
      color: var(--text-faint); font-size: 12px; line-height: 1.8; padding: 22px; text-align: center;
    }

    .toast {
      position: fixed; right: 18px; bottom: 18px; max-width: min(360px, calc(100vw - 36px));
      transform: translateY(16px); border: 1px solid var(--border-strong); border-radius: 8px;
      background: var(--bg-panel-strong); box-shadow: var(--shadow); color: var(--text-primary);
      font-size: 12px; opacity: 0; padding: 10px 13px; pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }
    .toast.isVisible { transform: translateY(0); opacity: 1; }

    @media (max-width: 900px) {
      .workspace { grid-template-columns: 1fr; grid-template-rows: minmax(220px, 38vh) minmax(0, 1fr); }
      .editorArea { border-right: 0; border-bottom: 1px solid var(--border-subtle); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brandMark" aria-hidden="true">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
            <path d="M5 4h14M12 4v16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        <span>Then — Idea 再設計案（スレッド一覧 → 詳細の二段ナビ）</span>
      </div>
      <span class="topNote">一覧で即キャプチャ・クリックで中身へドリルダウン</span>
    </header>

    <main class="workspace">
      <!-- 本文側はコンテキスト用に控えめ -->
      <section class="editorArea" aria-label="本文">
        <div class="editorBar">
          <span>第2章　雨の前.md</span>
          <span class="statusDot" id="insertStatus">0 件挿入</span>
        </div>
        <div class="manuscriptWrap">
          <article class="manuscript" id="manuscript">
            <h1>第2章　雨の前</h1>
            <div class="manuscriptText" id="manuscriptText">駅前の広場には、まだ昼の熱が残っていた。

通りの向こうで信号が変わり、人の流れだけが先に夕方へ進んでいく。</div>
          </article>
        </div>
      </section>

      <!-- Idea ペイン -->
      <aside class="ideaPane" aria-label="Idea">
        <div class="stage">
          <div class="track" id="track">

            <!-- ① 一覧ビュー -->
            <section class="view" aria-label="スレッド一覧">
              <div class="viewTop">
                <div class="paneHead">
                  <h2>Idea <span class="count" id="threadCount"></span></h2>
                  <button class="newThreadBtn" id="newThreadBtn" type="button">
                    <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                    スレッド
                  </button>
                </div>
                <div class="capture">
                  <div class="captureBox">
                    <textarea id="captureInput" rows="1" placeholder="思いついたことをそのまま書く…（Enter で追加 / Shift+Enter で改行）"></textarea>
                    <div class="captureRow">
                      <select class="destSelect" id="captureDest" aria-label="追加先スレッド"></select>
                      <button class="primaryBtn" id="captureBtn" type="button" disabled>
                        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
                        追加
                      </button>
                    </div>
                  </div>
                </div>
                <div class="filterBar" id="filterBar"></div>
              </div>
              <div class="scrollArea" id="threadList"></div>
            </section>

            <!-- ② 詳細ビュー -->
            <section class="view" aria-label="スレッド詳細">
              <div class="viewTop detailTop">
                <div class="detailNav">
                  <button class="backBtn" id="backBtn" type="button">
                    <svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg>
                    一覧
                  </button>
                  <div class="detailActions">
                    <button class="iconBtn" id="detailStarBtn" type="button" title="スター">
                      <svg viewBox="0 0 24 24"><polygon points="12 3 15 9 22 9.8 17 14.5 18.2 21.4 12 18.1 5.8 21.4 7 14.5 2 9.8 9 9"/></svg>
                    </button>
                    <button class="iconBtn" id="insertAllBtn" type="button" title="未使用をまとめて本文へ">
                      <svg viewBox="0 0 24 24"><path d="M4 6h12M4 12h8M4 18h8"/><path d="M15 13l4 4 4-4"/><path d="M19 17V7"/></svg>
                    </button>
                    <button class="iconBtn" id="deleteThreadBtn" type="button" title="スレッドを削除">
                      <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>
                    </button>
                  </div>
                </div>
                <input class="detailTitle" id="detailTitle" aria-label="スレッド名">
                <div class="detailStats" id="detailStats"></div>
                <div class="capture" style="padding: 0 0 12px;">
                  <div class="captureBox">
                    <textarea id="fragInput" rows="1" placeholder="このスレッドに断片を追加…（Enter で追加）"></textarea>
                    <div class="captureRow">
                      <span class="captureHint">作成順に下へ積まれます</span>
                      <button class="primaryBtn" id="fragBtn" type="button" disabled>
                        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                        断片を追加
                      </button>
                    </div>
                  </div>
                </div>
              </div>
              <div class="scrollArea" id="fragList"></div>
            </section>

          </div>
        </div>
      </aside>
    </main>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script>
    const icons = {
      star: '<svg viewBox="0 0 24 24"><polygon points="12 3 15 9 22 9.8 17 14.5 18.2 21.4 12 18.1 5.8 21.4 7 14.5 2 9.8 9 9"/></svg>',
      chevR: '<svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>',
      check: '<svg viewBox="0 0 24 24"><path d="m5 12 4 4L19 6"/></svg>',
      trash: '<svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>',
      grip: '<svg viewBox="0 0 24 24"><circle cx="9" cy="6" r="1.4"/><circle cx="15" cy="6" r="1.4"/><circle cx="9" cy="12" r="1.4"/><circle cx="15" cy="12" r="1.4"/><circle cx="9" cy="18" r="1.4"/><circle cx="15" cy="18" r="1.4"/></svg>'
    };

    const NOW = new Date("2026-06-28T12:00:00.000Z");
    let dragging = null;

    const state = {
      view: "list",          // "list" | "detail"
      filter: "all",
      destId: "inbox",       // 一覧キャプチャの追加先
      selectedId: null,
      inserted: 0,
      isComposing: false,
      threads: [
        {
          id: "inbox", kind: "inbox", title: "インボックス", starred: false,
          updatedAt: "2026-06-28T11:40:00.000Z",
          fragments: [
            { id: "f-a", body: "雨は降らないのに、傘を持つ人だけが増えていく描写を入れたい。", used: false, createdAt: "2026-06-28T11:40:00.000Z" },
            { id: "f-b", body: "「待っている」と「足止めされている」は違う、という主人公の感覚。", used: false, createdAt: "2026-06-27T20:05:00.000Z" }
          ]
        },
        {
          id: "t-rain", kind: "thread", title: "雨の前の駅前（場面）", starred: true,
          updatedAt: "2026-06-28T10:02:00.000Z",
          fragments: [
            { id: "f1", body: "湿った風だけが先に着いていて、誰もまだ傘を開いていない。", used: false, createdAt: "2026-06-20T09:13:00.000Z" },
            { id: "f2", body: "信号機の青だけが、妙に水っぽく見える。", used: true, createdAt: "2026-06-24T22:32:00.000Z" }
          ]
        },
        {
          id: "t-memo", kind: "thread", title: "部屋に残されたメモ（伏線）", starred: false,
          updatedAt: "2026-06-27T21:16:00.000Z",
          fragments: [
            { id: "f3", body: "メモは文章ではなく、駅名だけが三つ並んでいる。", used: false, createdAt: "2026-06-18T07:45:00.000Z" },
            { id: "f4", body: "紙の端だけが日焼けしていて、長く貼られていたと分かる。", used: false, createdAt: "2026-06-27T21:16:00.000Z" }
          ]
        },
        {
          id: "t-policy", kind: "thread", title: "町の名前は出さない（方針）", starred: false,
          updatedAt: "2026-06-12T12:00:00.000Z",
          fragments: [
            { id: "f5", body: "地名を伏せ、駅の構造と湿度だけで土地を感じさせる。", used: true, createdAt: "2026-06-10T12:00:00.000Z" }
          ]
        }
      ]
    };

    const filters = [["all", "すべて"], ["unused", "未使用"], ["starred", "スター"]];

    const els = {
      track: document.getElementById("track"),
      threadCount: document.getElementById("threadCount"),
      newThreadBtn: document.getElementById("newThreadBtn"),
      captureInput: document.getElementById("captureInput"),
      captureDest: document.getElementById("captureDest"),
      captureBtn: document.getElementById("captureBtn"),
      filterBar: document.getElementById("filterBar"),
      threadList: document.getElementById("threadList"),
      backBtn: document.getElementById("backBtn"),
      detailStarBtn: document.getElementById("detailStarBtn"),
      insertAllBtn: document.getElementById("insertAllBtn"),
      deleteThreadBtn: document.getElementById("deleteThreadBtn"),
      detailTitle: document.getElementById("detailTitle"),
      detailStats: document.getElementById("detailStats"),
      fragInput: document.getElementById("fragInput"),
      fragBtn: document.getElementById("fragBtn"),
      fragList: document.getElementById("fragList"),
      manuscript: document.getElementById("manuscript"),
      manuscriptText: document.getElementById("manuscriptText"),
      insertStatus: document.getElementById("insertStatus"),
      toast: document.getElementById("toast")
    };

    const esc = (v) => v.replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    const findThread = (id) => state.threads.find((t) => t.id === id);
    const selected = () => findThread(state.selectedId);
    const totalFragments = () => state.threads.reduce((n, t) => n + t.fragments.length, 0);
    const touch = (t) => (t.updatedAt = new Date().toISOString());

    function rel(iso) {
      const days = Math.floor(Math.max(0, NOW - new Date(iso)) / 86400000);
      if (days <= 0) return "今日";
      if (days === 1) return "昨日";
      if (days < 7) return days + "日前";
      return Math.floor(days / 7) + "週間前";
    }

    function threadVisible(t) {
      if (state.filter === "starred") return t.starred || t.kind === "inbox";
      if (state.filter === "unused") return t.fragments.some((f) => !f.used) || t.kind === "inbox";
      return true;
    }
    function summary(t) {
      const pick = t.fragments.find((f) => !f.used) || t.fragments[0];
      return pick ? pick.body : "（断片なし）";
    }

    /* ---------- 一覧ビュー ---------- */
    function renderFilters() {
      els.filterBar.innerHTML = "";
      filters.forEach(([id, label]) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "chip" + (state.filter === id ? " isActive" : "");
        b.textContent = label;
        b.onclick = () => { state.filter = id; renderList(); };
        els.filterBar.appendChild(b);
      });
    }

    function renderDest() {
      if (!findThread(state.destId)) state.destId = "inbox";
      els.captureDest.innerHTML = "";
      state.threads.forEach((t) => {
        const o = document.createElement("option");
        o.value = t.id;
        o.textContent = (t.kind === "inbox" ? "▾ " : "") + t.title;
        if (t.id === state.destId) o.selected = true;
        els.captureDest.appendChild(o);
      });
    }

    function moveFragment(from, fragId, toId) {
      const i = from.fragments.findIndex((f) => f.id === fragId);
      const to = findThread(toId);
      if (i < 0 || !to || to.id === from.id) return;
      const [fr] = from.fragments.splice(i, 1);
      to.fragments.push(fr);
      touch(from); touch(to);
      renderDetail();
      toast(`「${to.title}」へ移動しました`);
    }

    function renderList() {
      renderFilters();
      renderDest();
      els.threadCount.textContent = `· ${state.threads.length - 1} スレッド / ${totalFragments()} 断片`;
      const visible = state.threads.filter(threadVisible);
      els.threadList.innerHTML = "";
      if (visible.length === 0) {
        els.threadList.innerHTML = `<div class="emptyState">該当するスレッドがありません</div>`;
        return;
      }
      visible.forEach((t) => {
        const unused = t.fragments.filter((f) => !f.used).length;
        const row = document.createElement("article");
        row.className = "threadRow" + (t.kind === "inbox" ? " isInbox" : "");
        row.innerHTML = `
          <div class="rowMain">
            <div class="rowTitle">${t.starred ? `<span class="star">${icons.star}</span>` : ""}${esc(t.title)}</div>
            <div class="rowSummary">${esc(summary(t))}</div>
            <div class="rowMeta">
              <span>${t.fragments.length} 断片</span>
              ${unused ? `<span class="unused">${unused} 未使用</span>` : `<span>消化済み</span>`}
              <span>${rel(t.updatedAt)}</span>
            </div>
          </div>
          <div class="rowChevron">${icons.chevR}</div>`;
        row.onclick = () => openThread(t.id);
        els.threadList.appendChild(row);
      });
    }

    /* ---------- 詳細ビュー ---------- */
    function fragmentNode(t, fr) {
      const node = document.createElement("article");
      node.className = "fragment" + (fr.used ? " isUsed" : "");
      node.dataset.frag = fr.id;
      node.innerHTML = `
        <span class="dragHandle" draggable="true" title="ドラッグで本文へ">${icons.grip}</span>
        <div>
          <div class="fragBody" contenteditable="true" spellcheck="false">${esc(fr.body)}</div>
          <div class="fragFoot">
            <span class="fragTime">${rel(fr.createdAt)}</span>
            <span class="fragBtns">
              <select class="moveSelect" data-act="move" title="別スレッドへ移動">
                <option value="">→ 移動…</option>
                ${state.threads.filter((x) => x.id !== t.id).map((x) => `<option value="${x.id}">${esc((x.kind === "inbox" ? "▾ " : "") + x.title)}</option>`).join("")}
              </select>
              <button class="textBtn" data-act="insert" type="button">本文へ</button>
              <button class="miniIcon ${fr.used ? "isOn" : ""}" data-act="used" type="button" title="使用済み">${icons.check}</button>
              <button class="miniIcon" data-act="del" type="button" title="削除">${icons.trash}</button>
            </span>
          </div>
        </div>`;

      node.querySelector('[data-act="move"]').addEventListener("change", (e) => {
        if (e.target.value) moveFragment(t, fr.id, e.target.value);
      });
      node.querySelector(".fragBody").addEventListener("blur", (e) => {
        const v = e.target.textContent.trim();
        if (v) fr.body = v; else e.target.textContent = fr.body;
      });
      node.querySelector('[data-act="insert"]').onclick = () => { insert(fr.body); fr.used = true; touch(t); renderDetail(); };
      node.querySelector('[data-act="used"]').onclick = () => { fr.used = !fr.used; touch(t); renderDetail(); };
      node.querySelector('[data-act="del"]').onclick = () => {
        t.fragments = t.fragments.filter((x) => x.id !== fr.id); touch(t); renderDetail(); toast("断片を削除しました");
      };

      const handle = node.querySelector(".dragHandle");
      handle.addEventListener("dragstart", (e) => {
        dragging = { threadId: t.id, fragId: fr.id };
        node.classList.add("isDragging");
        e.dataTransfer.effectAllowed = "copy";
        e.dataTransfer.setData("text/plain", fr.body);
      });
      handle.addEventListener("dragend", () => {
        node.classList.remove("isDragging"); dragging = null; els.manuscript.classList.remove("isDropTarget");
      });
      return node;
    }

    function renderDetail() {
      const t = selected();
      if (!t) { showList(); return; }
      const unused = t.fragments.filter((f) => !f.used).length;

      els.detailTitle.value = t.title;
      els.detailTitle.readOnly = t.kind === "inbox";
      els.detailStarBtn.classList.toggle("isOn", t.starred);
      els.detailStarBtn.style.display = t.kind === "inbox" ? "none" : "";
      els.deleteThreadBtn.style.display = t.kind === "inbox" ? "none" : "";
      els.detailStats.innerHTML = `
        <span>${t.fragments.length} 断片</span>
        ${unused ? `<span class="unused">${unused} 未使用</span>` : `<span>消化済み</span>`}
        <span>${rel(t.updatedAt)} 更新</span>`;

      els.fragList.innerHTML = "";
      if (t.fragments.length === 0) {
        els.fragList.innerHTML = `<div class="emptyState">まだ断片がありません。<br>上の入力欄から書き溜めましょう。</div>`;
      } else {
        t.fragments.forEach((fr) => els.fragList.appendChild(fragmentNode(t, fr)));
      }
    }

    /* ---------- ナビゲーション ---------- */
    function showList() {
      state.view = "list";
      els.track.classList.remove("showDetail");
      renderList();
    }
    function openThread(id) {
      state.selectedId = id;
      state.view = "detail";
      els.track.classList.add("showDetail");
      renderDetail();
      els.fragList.scrollTop = 0;
    }

    /* ---------- 操作 ---------- */
    function insert(text) {
      els.manuscriptText.textContent = `${els.manuscriptText.textContent.replace(/\s+$/, "")}\n\n${text}`;
      state.inserted += 1;
      els.insertStatus.textContent = `${state.inserted} 件挿入`;
      toast("本文へ挿入しました");
    }

    function capture() {
      const v = els.captureInput.value.trim();
      if (!v) return;
      const dest = findThread(state.destId) || findThread("inbox");
      const entry = { id: "f" + Date.now(), body: v, used: false, createdAt: new Date().toISOString() };
      // インボックスは新しいものを上に、通常スレッドは作成順に下へ
      if (dest.kind === "inbox") dest.fragments.unshift(entry); else dest.fragments.push(entry);
      touch(dest);
      els.captureInput.value = "";
      autoGrow(els.captureInput);
      els.captureBtn.disabled = true;
      renderList();
      els.captureInput.focus();
      toast(`「${dest.title}」に追加しました`);
    }

    function addFragment() {
      const t = selected();
      const v = els.fragInput.value.trim();
      if (!t || !v) return;
      t.fragments.push({ id: "f" + Date.now(), body: v, used: false, createdAt: new Date().toISOString() });
      touch(t);
      els.fragInput.value = "";
      autoGrow(els.fragInput);
      els.fragBtn.disabled = true;
      renderDetail();
      els.fragInput.focus();
      els.fragList.scrollTop = els.fragList.scrollHeight;
    }

    function newThread() {
      const t = { id: "t" + Date.now(), kind: "thread", title: "新しいスレッド", starred: false, updatedAt: new Date().toISOString(), fragments: [] };
      state.threads.splice(1, 0, t);
      openThread(t.id);
      els.detailTitle.focus();
      els.detailTitle.select();
    }

    /* ---------- 本文へのドロップ ---------- */
    els.manuscript.addEventListener("dragover", (e) => {
      if (!dragging) return;
      e.preventDefault(); e.dataTransfer.dropEffect = "copy";
      els.manuscript.classList.add("isDropTarget");
    });
    els.manuscript.addEventListener("dragleave", (e) => {
      if (!els.manuscript.contains(e.relatedTarget)) els.manuscript.classList.remove("isDropTarget");
    });
    els.manuscript.addEventListener("drop", (e) => {
      e.preventDefault(); els.manuscript.classList.remove("isDropTarget");
      if (!dragging) return;
      const t = findThread(dragging.threadId);
      const fr = t && t.fragments.find((f) => f.id === dragging.fragId);
      if (fr) { insert(fr.body); fr.used = true; touch(t); renderDetail(); }
    });

    /* ---------- IME 安全な Enter 送信 ---------- */
    function attachComposer(el, submit, onInput) {
      el.addEventListener("input", () => { autoGrow(el); onInput(); });
      el.addEventListener("compositionstart", () => (state.isComposing = true));
      el.addEventListener("compositionend", () => (state.isComposing = false));
      el.addEventListener("keydown", (e) => {
        if (e.key !== "Enter" || e.shiftKey || state.isComposing || e.isComposing) return;
        e.preventDefault(); submit();
      });
    }
    function autoGrow(ta) { ta.style.height = "auto"; ta.style.height = Math.min(140, ta.scrollHeight) + "px"; }

    attachComposer(els.captureInput, capture, () => (els.captureBtn.disabled = !els.captureInput.value.trim()));
    attachComposer(els.fragInput, addFragment, () => (els.fragBtn.disabled = !els.fragInput.value.trim()));
    els.captureBtn.onclick = capture;
    els.captureDest.onchange = () => { state.destId = els.captureDest.value; };
    els.fragBtn.onclick = addFragment;
    els.newThreadBtn.onclick = newThread;
    els.backBtn.onclick = showList;

    els.detailStarBtn.onclick = () => { const t = selected(); if (!t) return; t.starred = !t.starred; touch(t); renderDetail(); };
    els.insertAllBtn.onclick = () => {
      const t = selected(); if (!t) return;
      const pending = t.fragments.filter((f) => !f.used);
      if (!pending.length) { toast("未使用の断片がありません"); return; }
      insert(pending.map((f) => f.body).join("\n"));
      pending.forEach((f) => (f.used = true));
      touch(t); renderDetail();
    };
    els.deleteThreadBtn.onclick = () => {
      const t = selected(); if (!t || t.kind === "inbox") return;
      if (!confirm(`「${t.title}」を削除しますか？（断片 ${t.fragments.length} 件）`)) return;
      state.threads = state.threads.filter((x) => x.id !== t.id);
      showList(); toast("スレッドを削除しました");
    };
    els.detailTitle.addEventListener("input", () => {
      const t = selected(); if (!t || t.kind === "inbox") return;
      t.title = els.detailTitle.value; touch(t);
    });
    els.detailTitle.addEventListener("keydown", (e) => { if (e.key === "Enter") { e.preventDefault(); els.detailTitle.blur(); } });

    let toastTimer = null;
    function toast(msg) {
      els.toast.textContent = msg;
      els.toast.classList.add("isVisible");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => els.toast.classList.remove("isVisible"), 1500);
    }

    showList();
  </script>
</body>
</html>
